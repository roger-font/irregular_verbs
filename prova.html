<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Gestió de Verbs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-2xl mx-auto">
        <div class="bg-white p-8 rounded-2xl shadow-lg mb-8">
            <h2 class="text-xl font-bold mb-4 text-indigo-600">Afegir Nou Verb</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="text" id="inf" placeholder="Infinitiu" class="border p-2 rounded">
                <input type="text" id="ps" placeholder="Past Simple" class="border p-2 rounded">
                <input type="text" id="pp" placeholder="Past Participle" class="border p-2 rounded">
                <input type="text" id="tr" placeholder="Traducció" class="border p-2 rounded">
            </div>
            <button id="btnGuardar" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">
                GUARDAR A LA BASE DE DADES
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <h3 class="font-bold mb-4 text-slate-600">Els teus verbs guardats:</h3>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="text-slate-400 border-b">
                        <th class="pb-2">Infinitiu</th>
                        <th class="pb-2">Traducció</th>
                        <th class="pb-2 text-center">Acció</th>
                    </tr>
                </thead>
                <tbody id="llistaVerbs">
                    </tbody>
            </table>
        </div>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-indigo-600 font-bold underline">← Tornar al joc</a>
        </div>
    </div>

    <script>
        const URL = 'https://faatliqxkgscjxgclccf.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhYXRsaXF4a2dzY2p4Z2NsY2NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA4NDAsImV4cCI6MjA4NzU5Njg0MH0.u_fW-dsXZqwkBhHx_t5j4ZBh8jUW-V892xZe1PEObj8';
        const supabase = window.supabase.createClient(URL, KEY);

        // FUNCIÓ PER CARREGAR LA LLISTA
        async function carregarLlista() {
            const { data, error } = await supabase.from('verbs').select('*').order('infinitiu');
            if (error) return;
            
            const tbody = document.getElementById('llistaVerbs');
            tbody.innerHTML = '';
            data.forEach(v => {
                tbody.innerHTML += `
                    <tr class="border-b last:border-0">
                        <td class="py-3 font-bold">${v.infinitiu}</td>
                        <td class="py-3 text-slate-600">${v.traduccio}</td>
                        <td class="py-3 text-center">
                            <button onclick="esborrar(${v.id})" class="text-red-400 hover:text-red-600">❌</button>
                        </td>
                    </tr>
                `;
            });
        }

        // FUNCIÓ PER ESBORRAR
        window.esborrar = async function(id) {
            if (!confirm("Vols eliminar aquest verb?")) return;
            const { error } = await supabase.from('verbs').delete().eq('id', id);
            if (error) alert("Error en esborrar");
            else carregarLlista();
        }

        // BOTO GUARDAR
        document.getElementById('btnGuardar').onclick = async function() {
            const i = document.getElementById('inf').value.trim();
            const s = document.getElementById('ps').value.trim();
            const p = document.getElementById('pp').value.trim();
            const t = document.getElementById('tr').value.trim();

            if (!i || !s || !p || !t) {
                alert("Omple-ho tot!");
                return;
            }

            const { error } = await supabase.from('verbs').insert([{ 
                infinitiu: i, past_simple: s, past_participle: p, traduccio: t 
            }]);

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("✅ Guardat!");
                document.querySelectorAll('input').forEach(input => input.value = '');
                carregarLlista(); // Actualitzem la llista sense recarregar la pàgina
            }
        };

        // Carreguem la llista al principi
        window.onload = carregarLlista;
    </script>
</body>
</html>
