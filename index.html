<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Verbs Irregulars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .infinitiv-box { background: linear-gradient(135deg, #4f46e5, #9333ea); color: white; border-radius: 2rem; padding: 3rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .option-btn { background: white; border: 2px solid #e2e8f0; padding: 1rem; border-radius: 1rem; font-weight: 700; transition: all 0.2s; width: 100%; color: #334155; margin-bottom: 0.75rem; }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
        .incorrect { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .progress-bar { height: 8px; background-color: #e2e8f0; border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: #4f46e5; transition: width 0.4s ease; width: 0%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-end mb-6">
            <a href="gestio.html" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-600 transition-all shadow-md flex items-center gap-2">
                <span>⚙️</span> Gestionar Verbs
            </a>
        </div>

        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight italic">VERBS<span class="text-indigo-600">PRO</span></h1>
            </div>
            <div class="flex gap-6 font-mono text-xl font-bold">
                <div class="text-emerald-500">✅ <span id="hits">0</span></div>
                <div class="text-rose-500">❌ <span id="misses">0</span></div>
            </div>
        </div>

        <div class="progress-bar mb-10">
            <div id="progress-fill"></div>
        </div>

        <div class="infinitiv-box mb-10">
            <p class="text-xs uppercase font-bold opacity-70 mb-2 tracking-[0.2em]">Infinitiu</p>
            <h2 id="target" class="text-6xl font-black capitalize tracking-tight">---</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="col-ps"></div>
            <div id="col-pp"></div>
            <div id="col-tr"></div>
        </div>

        <button id="btn-next" onclick="nextVerb()" disabled class="w-full mt-12 bg-slate-200 text-slate-400 py-6 rounded-3xl font-black uppercase text-xl transition-all cursor-not-allowed">
            Següent Verb
        </button>
    </div>

    <script>
        // Aquests verbs més endavant vindran de Supabase
        const verbs = [
            { i: 'be', s: 'was/were', p: 'been', t: 'ser/estar' },
            { i: 'become', s: 'became', p: 'become', t: 'esdevenir' },
            { i: 'begin', s: 'began', p: 'begun', t: 'començar' },
            { i: 'break', s: 'broke', p: 'broken', t: 'trencar' },
            { i: 'bring', s: 'brought', p: 'brought', t: 'portar' },
            { i: 'buy', s: 'bought', p: 'bought', t: 'comprar' }
        ];

        // Creem una llista amb totes les traduccions per fer el joc més difícil
        const totesLesTraduccions = verbs.map(v => v.t);

        let idx = 0;
        let ok = { s: false, p: false, t: false };

        function render(id, correct, type, label) {
            const container = document.getElementById(id);
            container.innerHTML = `<p class="text-center text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">${label}</p>`;
            
            let opts = [correct];

            // LÒGICA DE TRADUCCIÓ ALEATÒRIA (Punt 3 del teu missatge)
            if (type === 'tr') {
                let distractors = totesLesTraduccions.filter(t => t !== correct);
                distractors = distractors.sort(() => 0.5 - Math.random());
                opts.push(...distractors.slice(0, 3));
            } else {
                // Per PS i PP usem distractors genèrics
                const distractors = ['done', 'been', 'seen', 'taken', 'made', 'gone'];
                let dPool = distractors.filter(d => d !== correct).sort(() => 0.5 - Math.random());
                opts.push(...dPool.slice(0, 3));
            }

            opts.sort(() => Math.random() - 0.5);
            
            opts.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'option-btn shadow-sm';
                b.innerText = txt;
                b.onclick = () => {
                    if (ok[type]) return;
                    if (txt === correct) {
                        b.classList.add('correct');
                        ok[type] = true;
                        checkComplete();
                    } else {
                        b.classList.add('incorrect');
                        document.getElementById('misses').innerText = parseInt(document.getElementById('misses').innerText) + 1;
                        setTimeout(() => b.classList.remove('incorrect'), 500);
                    }
                };
                container.appendChild(b);
            });
        }

        function checkComplete() {
            if (ok.s && ok.p && ok.t) {
                const btn = document.getElementById('btn-next');
                btn.disabled = false;
                btn.className = 'w-full mt-12 bg-indigo-600 text-white py-6 rounded-3xl font-black uppercase text-xl shadow-lg cursor-pointer';
            }
        }

        function nextVerb() {
            document.getElementById('hits').innerText = parseInt(document.getElementById('hits').innerText) + 1;
            idx++;
            document.getElementById('progress-fill').style.width = (idx / verbs.length) * 100 + '%';

            if (idx >= verbs.length) {
                alert("👑 Has acabat la llista actual!");
                idx = 0;
                location.reload();
            }
            init();
        }

        function init() {
            ok = { s: false, p: false, t: false };
            const v = verbs[idx];
            document.getElementById('target').innerText = v.i;
            const btn = document.getElementById('btn-next');
            btn.disabled = true;
            btn.className = 'w-full mt-12 bg-slate-200 text-slate-400 py-6 rounded-3xl font-black uppercase text-xl cursor-not-allowed';
            
            render('col-ps', v.s, 's', 'Past Simple');
            render('col-pp', v.p, 'p', 'Past Participle');
            render('col-tr', v.t, 't', 'Traducció');
        }

        init();
    </script>
</body>
</html>
