<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Master - Joc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Eliminem qualsevol efecte d'enfonsament o ombra predeterminada */
        input {
            appearance: none;
            -webkit-appearance: none;
            box-shadow: none !important;
            border-style: solid !important;
        }

        /* Estat Normal: Contorn gris fi, sense ombres */
        .input-normal {
            border-color: #f1f5f9; /* slate-100 */
            background-color: #ffffff;
        }

        /* Focus Blau: Contorn blau pla quan escrius */
        .input-normal:focus {
            outline: none !important;
            border-color: #6366f1 !important; /* indigo-500 */
            box-shadow: none !important;
        }

        /* Estat Error: Contorn vermell pla */
        .input-error {
            border-color: #ef4444 !important; /* red-500 */
            background-color: #fffafb;
        }

        /* Focus Error: Es manté vermell encara que hi tinguis el cursor */
        .input-error:focus {
            outline: none !important;
            border-color: #ef4444 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-700">

    <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-xl text-center relative border border-slate-50">
        
        <div id="streak-container" class="absolute -top-6 left-1/2 -translate-x-1/2 bg-white px-6 py-2 rounded-full shadow-md border border-orange-100 flex items-center gap-2 transition-all duration-500 opacity-0 translate-y-4 font-light">
            <span class="text-xl">🔥</span>
            <span id="streak-count" class="font-medium text-orange-500 text-xl italic">0</span>
            <span class="text-xs text-slate-400 uppercase tracking-widest font-bold">Ratxa</span>
        </div>

        <div class="mb-10">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight italic uppercase">
                VERB<span class="text-indigo-600">MASTER</span>
            </h1>
            <p id="progres" class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] italic mt-2">Iniciant...</p>
        </div>

        <div id="pantalla-joc" style="display: none;">
            <div class="bg-indigo-600 text-white p-10 rounded-[2.5rem] mb-10 relative overflow-hidden">
                <p class="text-[10px] uppercase tracking-[0.2em] opacity-70 mb-2 font-bold">Traducció</p>
                <h2 id="verb-catala" class="text-4xl font-normal italic tracking-tight">---</h2>
            </div>

            <div class="space-y-4">
                <input type="text" id="ans-i" placeholder="Infinitiu" autocomplete="off" class="input-normal w-full border-2 p-5 rounded-2xl text-center text-xl font-light transition-all">
                <input type="text" id="ans-s" placeholder="Past Simple" autocomplete="off" class="input-normal w-full border-2 p-5 rounded-2xl text-center text-xl font-light transition-all">
                <input type="text" id="ans-p" placeholder="Past Participle" autocomplete="off" class="input-normal w-full border-2 p-5 rounded-2xl text-center text-xl font-light transition-all">
                
                <button id="btnComprovar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all tracking-[0.2em] uppercase mt-4">Comprovar</button>
            </div>
        </div>

        <div class="mt-12 pt-6 border-t border-slate-50 flex justify-between items-center text-[10px] font-bold text-slate-300 uppercase tracking-widest">
            <a href="choose.html" class="hover:text-indigo-600 transition-colors">CHOOSE</a>
            <a href="gestio.html" class="hover:text-indigo-600 transition-colors">AFEGIR</a>
        </div>
    </div>

    <script>
        const URL_S = 'https://faatliqxkgscjxgclccf.supabase.co';
        const KEY_S = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhYXRsaXF4a2dzY2p4Z2NsY2NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA4NDAsImV4cCI6MjA4NzU5Njg0MH0.u_fW-dsXZqwkBhHx_t5j4ZBh8jUW-V892xZe1PEObj8';
        
        let clientSupa;
        let dadesVerbs = [];
        let verbEnPantalla = {};
        let racha = 0;

        async function inicialitzar() {
            if (!window.supabase) { setTimeout(inicialitzar, 200); return; }
            clientSupa = window.supabase.createClient(URL_S, KEY_S);
            try {
                const { data, error } = await clientSupa.from('verbs').select('*');
                if (error) throw error;
                dadesVerbs = data;
                document.getElementById('progres').innerText = `${data.length} verbs carregats`;
                document.getElementById('pantalla-joc').style.display = 'block';
                nouVerb();
            } catch (err) { document.getElementById('progres').innerText = "❌ Error connexió"; }
        }

        function nouVerb() {
            verbEnPantalla = dadesVerbs[Math.floor(Math.random() * dadesVerbs.length)];
            document.getElementById('verb-catala').innerText = verbEnPantalla.traduccio;
            
            ['ans-i', 'ans-s', 'ans-p'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                resetEstil(el);
            });
            document.getElementById('ans-i').focus();
            actualitzarStreak();
        }

        function resetEstil(el) {
            el.classList.remove('input-error');
            el.classList.add('input-normal');
        }

        function posarVermell(el) {
            el.classList.remove('input-normal');
            el.classList.add('input-error');
        }

        function actualitzarStreak() {
            const cont = document.getElementById('streak-container');
            const num = document.getElementById('streak-count');
            if (racha > 0) {
                cont.classList.remove('opacity-0', 'translate-y-4');
                num.innerText = racha;
            } else {
                cont.classList.add('opacity-0', 'translate-y-4');
            }
        }

        function comprovar() {
            const v1 = document.getElementById('ans-i');
            const v2 = document.getElementById('ans-s');
            const v3 = document.getElementById('ans-p');

            const ok1 = v1.value.trim().toLowerCase() === verbEnPantalla.infinitiu.toLowerCase();
            const ok2 = v2.value.trim().toLowerCase() === verbEnPantalla.past_simple.toLowerCase();
            const ok3 = v3.value.trim().toLowerCase() === verbEnPantalla.past_participle.toLowerCase();

            if (ok1 && ok2 && ok3) {
                racha++;
                nouVerb();
            } else {
                racha = 0;
                actualitzarStreak();
                
                if (!ok1) { posarVermell(v1); v1.focus(); } else { resetEstil(v1); }
                if (!ok2) { posarVermell(v2); if (ok1) v2.focus(); } else { resetEstil(v2); }
                if (!ok3) { posarVermell(v3); if (ok1 && ok2) v3.focus(); } else { resetEstil(v3); }
            }
        }

        const inputsConfig = [
            { id: 'ans-i', camp: 'infinitiu' },
            { id: 'ans-s', camp: 'past_simple' },
            { id: 'ans-p', camp: 'past_participle' }
        ];

        inputsConfig.forEach(item => {
            const el = document.getElementById(item.id);
            el.addEventListener('blur', function() {
                if (this.value.trim().toLowerCase() === verbEnPantalla[item.camp].toLowerCase()) {
                    resetEstil(this);
                }
            });
            el.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') comprovar();
            });
        });

        document.getElementById('btnComprovar').onclick = comprovar;
        window.onload = inicialitzar;
    </script>
</body>
</html>
