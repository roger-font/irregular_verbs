<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Verbs Irregulars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-black text-indigo-600 mb-2">VERB MASTER</h1>
        <p id="progres" class="text-slate-400 text-sm mb-6 italic">Iniciant...</p>

        <div id="pantalla-joc" style="display: none;">
            <div class="bg-indigo-600 text-white p-6 rounded-2xl mb-6 shadow-lg">
                <p class="text-xs uppercase tracking-widest opacity-70 mb-1">Traducció</p>
                <h2 id="verb-catala" class="text-3xl font-bold italic text-white">---</h2>
            </div>

            <div class="space-y-4">
                <input type="text" id="ans-i" placeholder="Infinitiu" class="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-indigo-500 transition-all">
                <input type="text" id="ans-s" placeholder="Past Simple" class="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-indigo-500 transition-all">
                <input type="text" id="ans-p" placeholder="Past Participle" class="w-full border-2 p-3 rounded-xl text-center outline-none focus:border-indigo-500 transition-all">
                
                <button id="btnComprovar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-lg hover:bg-indigo-700 shadow-md">COMPROVAR</button>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between items-center text-xs">
            <button onclick="location.reload()" class="text-slate-400 hover:text-indigo-600 font-bold italic">🔄 REINICIAR</button>
            <a href="gestio.html" class="text-indigo-400 hover:text-indigo-600 font-bold uppercase">⚙️ Gestió</a>
        </div>
    </div>

   <script>
    const URL_PRINCIPAL = 'https://faatliqxkgscjxgclccf.supabase.co';
    const KEY_PRINCIPAL = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhYXRsaXF4a2dzY2p4Z2NsY2NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA4NDAsImV4cCI6MjA4NzU5Njg0MH0.u_fW-dsXZqwkBhHx_t5j4ZBh8jUW-V892xZe1PEObj8';
    const conexioJoc = window.supabase.createClient(URL_PRINCIPAL, KEY_PRINCIPAL);

    let totsElsVerbs = [];
    let verbDePregunta = {};

    async function carregarJoc() {
        const p = document.getElementById('progres');
        p.innerText = "Carregant verbs...";
        
        const { data, error } = await conexioJoc.from('verbs').select('*');
        
        if (error || !data || data.length === 0) {
            p.innerText = "No hi ha verbs a la base de dades.";
            return;
        }

        totsElsVerbs = data;
        p.innerText = "Tens " + data.length + " verbs per practicar";
        document.getElementById('pantalla-joc').style.display = 'block';
        preguntaNova();
    }

    function preguntaNova() {
        verbDePregunta = totsElsVerbs[Math.floor(Math.random() * totsElsVerbs.length)];
        document.getElementById('verb-catala').innerText = verbDePregunta.traduccio;
        document.getElementById('ans-i').value = '';
        document.getElementById('ans-s').value = '';
        document.getElementById('ans-p').value = '';
        document.getElementById('ans-i').focus();
    }

    document.getElementById('btnComprovar').onclick = function() {
        const i = document.getElementById('ans-i').value.trim().toLowerCase();
        const s = document.getElementById('ans-s').value.trim().toLowerCase();
        const p = document.getElementById('ans-p').value.trim().toLowerCase();

        if (i === verbDePregunta.infinitiu.toLowerCase() && 
            s === verbDePregunta.past_simple.toLowerCase() && 
            p === verbDePregunta.past_participle.toLowerCase()) {
            alert("🌟🌟🌟🌟 CORRECTE 🌟🌟🌟🌟");
            preguntaNova();
        } else {
            alert("T'has equivocat...\nEra: " + verbDePregunta.infinitiu + " - " + verbDePregunta.past_simple + " - " + verbDePregunta.past_participle);
        }
    };

    window.onload = carregarJoc;
</script>
</body>
</html>
