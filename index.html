<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Verbs Irregulars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .infinitiv-box { background: linear-gradient(135deg, #4f46e5, #9333ea); color: white; border-radius: 2rem; padding: 3rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .option-btn { background: white; border: 2px solid #e2e8f0; padding: 1rem; border-radius: 1rem; font-weight: 700; transition: all 0.2s; width: 100%; color: #334155; margin-bottom: 0.75rem; }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
        .incorrect { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .progress-bar { height: 8px; background-color: #e2e8f0; border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: #4f46e5; transition: width 0.4s ease; width: 0%; }
        .loading-overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loader" class="loading-overlay font-bold text-indigo-600 italic text-2xl">Carregant verbs...</div>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-end mb-6">
            <a href="prova.html" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-indigo-600 transition-all shadow-md">
                ⚙️ Gestionar Verbs
            </a>
        </div>

        <div class="flex justify-between items-end mb-4">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight italic">VERBS<span class="text-indigo-600">PRO</span></h1>
            <div class="flex gap-6 font-mono text-xl font-bold">
                <div class="text-emerald-500">✅ <span id="hits">0</span></div>
                <div class="text-rose-500">❌ <span id="misses">0</span></div>
            </div>
        </div>

        <div class="progress-bar mb-10">
            <div id="progress-fill"></div>
        </div>

        <div class="infinitiv-box mb-10">
            <p class="text-xs uppercase font-bold opacity-70 mb-2 tracking-[0.2em]">Infinitiu</p>
            <h2 id="target" class="text-6xl font-black capitalize tracking-tight">---</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="col-ps"></div>
            <div id="col-pp"></div>
            <div id="col-tr"></div>
        </div>

        <button id="btn-next" onclick="nextVerb()" disabled class="w-full mt-12 bg-slate-200 text-slate-400 py-6 rounded-3xl font-black uppercase text-xl transition-all">
            Següent Verb
        </button>
    </div>

    <script>
        const URL = 'https://faatliqxkgscjxgclccf.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhYXRsaXF4a2dzY2p4Z2NsY2NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA4NDAsImV4cCI6MjA4NzU5Njg0MH0.u_fW-dsXZqwkBhHx_t5j4ZBh8jUW-V892xZe1PEObj8'; 
        const supabase = window.supabase.createClient(URL, KEY);

        let verbs = [];
        let totesLesTraduccions = [];
        let idx = 0;
        let ok = { s: false, p: false, t: false };

        async function carregarDades() {
            const { data, error } = await supabase.from('verbs').select('*');
            if (error || !data || data.length === 0) {
                alert("No hi ha verbs a la base de dades. Vés a 'Gestionar'!");
                return;
            }
            verbs = data.sort(() => Math.random() - 0.5);
            totesLesTraduccions = verbs.map(v => v.traduccio);
            document.getElementById('loader').style.display = 'none';
            init();
        }

        function render(id, correct, type, label) {
            const container = document.getElementById(id);
            container.innerHTML = `<p class="text-center text-[10px] font-black text-slate-400 uppercase mb-4">${label}</p>`;
            
            let opts = [correct];

            if (type === 'tr') {
                // Agafem 3 traduccions aleatòries d'altres verbs (Punt 3)
                let distractors = totesLesTraduccions.filter(t => t !== correct);
                distractors = distractors.sort(() => 0.5 - Math.random());
                opts.push(...distractors.slice(0, 3));
            } else {
                const distractors = ['done', 'been', 'seen', 'taken', 'made', 'gone', 'said'];
                let dPool = distractors.filter(d => d !== correct).sort(() => 0.5 - Math.random());
                opts.push(...dPool.slice(0, 3));
            }

            // Si falten opcions (perquè hi ha pocs verbs), farcim amb '---'
            while(opts.length < 4) opts.push("---");
            opts.sort(() => Math.random() - 0.5);
            
            opts.forEach(txt => {
                const b = document.createElement('button');
                b.className = 'option-btn shadow-sm';
                b.innerText = txt;
                b.onclick = () => {
                    if (ok[type]) return;
                    if (txt === correct) {
                        b.classList.add('correct');
                        ok[type] = true;
                        checkComplete();
                    } else {
                        b.classList.add('incorrect');
                        document.getElementById('misses').innerText = parseInt(document.getElementById('misses').innerText) + 1;
                        setTimeout(() => b.classList.remove('incorrect'), 500);
                    }
                };
                container.appendChild(b);
            });
        }

        function checkComplete() {
            if (ok.s && ok.p && ok.t) {
                const btn = document.getElementById('btn-next');
                btn.disabled = false;
                btn.className = 'w-full mt-12 bg-indigo-600 text-white py-6 rounded-3xl font-black uppercase text-xl shadow-lg cursor-pointer';
            }
        }

        function nextVerb() {
            document.getElementById('hits').innerText = parseInt(document.getElementById('hits').innerText) + 1;
            idx++;
            document.getElementById('progress-fill').style.width = (idx / verbs.length) * 100 + '%';

            if (idx >= verbs.length) {
                alert("👑 Felicitats! Has completat tota la teva base de dades.");
                idx = 0;
                location.reload();
            }
            init();
        }

        function init() {
            ok = { s: false, p: false, t: false };
            const v = verbs[idx];
            document.getElementById('target').innerText = v.infinitiu;
            const btn = document.getElementById('btn-next');
            btn.disabled = true;
            btn.className = 'w-full mt-12 bg-slate-200 text-slate-400 py-6 rounded-3xl font-black uppercase text-xl cursor-not-allowed';
            
            render('col-ps', v.past_simple, 's', 'Past Simple');
            render('col-pp', v.past_participle, 'p', 'Past Participle');
            render('col-tr', v.traduccio, 't', 'Traducció');
        }

        carregarDades();
    </script>
</body>
</html>
