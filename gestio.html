<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Gestió de Verbs - Panell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-6 font-sans">

    <div class="max-w-2xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-lg mb-8 border border-slate-200">
            <h2 class="text-2xl font-black mb-6 text-indigo-600 italic uppercase">Afegir Nou Verb</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="text" id="in-i" placeholder="Infinitiu (ex: Go)" class="border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                <input type="text" id="in-s" placeholder="Past Simple (ex: Went)" class="border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                <input type="text" id="in-p" placeholder="Past Participle (ex: Gone)" class="border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
                <input type="text" id="in-t" placeholder="Traducció (ex: Anar)" class="border-2 p-3 rounded-xl outline-none focus:border-indigo-500">
            </div>
            <button id="btnGuardar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition-all">
                GUARDAR A LA BASE DE DADES
            </button>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h3 class="font-bold mb-4 text-slate-500 uppercase tracking-widest text-sm text-center">Llista de Verbs Actuals</h3>
            <table class="w-full text-left">
                <tbody id="taulaVerbs"></tbody>
            </table>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-indigo-600 font-bold hover:underline">← Tornar al joc</a>
        </div>
    </div>

    <script>
        // Aquí només hi ha d'haver UN sol bloc de script
        const URL_DB = 'https://faatliqxkgscjxgclccf.supabase.co';
        const KEY_DB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhYXRsaXF4a2dzY2p4Z2NsY2NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjA4NDAsImV4cCI6MjA4NzU5Njg0MH0.u_fW-dsXZqwkBhHx_t5j4ZBh8jUW-V892xZe1PEObj8';
        const supabase = window.supabase.createClient(URL_DB, KEY_DB);

        async function carregarLlista() {
            const { data, error } = await supabase.from('verbs').select('*').order('infinitiu', { ascending: true });
            if (error) {
                console.error("Error carregar:", error);
                return;
            }
            const llista = document.getElementById('taulaVerbs');
            llista.innerHTML = '';
            data.forEach(v => {
                llista.innerHTML += `
                    <tr class="border-b last:border-0 hover:bg-slate-50">
                        <td class="py-4 px-2 font-bold text-slate-700">${v.infinitiu}</td>
                        <td class="py-4 px-2 text-slate-500 italic">${v.traduccio}</td>
                        <td class="py-4 px-2 text-right">
                            <button onclick="eliminar(${v.id})" class="bg-rose-50 text-rose-500 p-2 rounded-lg hover:bg-rose-500 hover:text-white transition-all text-xs font-bold">ELIMINAR</button>
                        </td>
                    </tr>`;
            });
        }

        window.eliminar = async function(id) {
            if (!confirm("Vols eliminar aquest verb?")) return;
            const { error } = await supabase.from('verbs').delete().eq('id', id);
            if (!error) carregarLlista();
        };

        window.onload = function() {
            carregarLlista();
            
            document.getElementById('btnGuardar').onclick = async function() {
                const i = document.getElementById('in-i').value.trim();
                const s = document.getElementById('in-s').value.trim();
                const p = document.getElementById('in-p').value.trim();
                const t = document.getElementById('in-t').value.trim();

                if (!i || !s || !p || !t) {
                    alert("⚠️ Falten dades!");
                    return;
                }

                const { error } = await supabase.from('verbs').insert([{ 
                    infinitiu: i, past_simple: s, past_participle: p, traduccio: t 
                }]);

                if (error) alert("Error Supabase: " + error.message);
                else {
                    alert("✅ Verb guardat!");
                    document.getElementById('in-i').value = '';
                    document.getElementById('in-s').value = '';
                    document.getElementById('in-p').value = '';
                    document.getElementById('in-t').value = '';
                    carregarLlista();
                }
            };
        };
    </script>
</body>
</html>
